<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Venn diagram of research interests</title>
  <desc>Two overlapping circles representing Geometric Deep Learning and Computational Optimal Transport with an intersection labeled Peak Focus.</desc>
  <defs>
    <clipPath id="clip-l"><circle cx="265" cy="165" r="135"/></clipPath>
    <clipPath id="clip-r"><circle cx="415" cy="165" r="135"/></clipPath>
  </defs>
  <circle cx="265" cy="165" r="135" fill="#CECBF6" stroke="#3C3489" stroke-width="1.5"/>
  <circle cx="415" cy="165" r="135" fill="#9FE1CB" stroke="#085041" stroke-width="1.5"/>
  <circle cx="415" cy="165" r="135" fill="#534AB7" opacity="0.55" clip-path="url(#clip-l)"/>
  <circle cx="265" cy="165" r="135" fill="#0F6E56" opacity="0.25" clip-path="url(#clip-r)"/>
  <text font-family="sans-serif" font-size="15" font-weight="600" x="200" y="148" text-anchor="middle" fill="#26215C">Geometric</text>
  <text font-family="sans-serif" font-size="15" font-weight="600" x="200" y="168" text-anchor="middle" fill="#26215C">Deep</text>
  <text font-family="sans-serif" font-size="15" font-weight="600" x="200" y="188" text-anchor="middle" fill="#26215C">Learning</text>
  <text font-family="sans-serif" font-size="11" x="200" y="208" text-anchor="middle" fill="#3C3489" opacity="0.8">(GDL)</text>
  <text font-family="sans-serif" font-size="15" font-weight="600" x="480" y="148" text-anchor="middle" fill="#04342C">Computational</text>
  <text font-family="sans-serif" font-size="15" font-weight="600" x="480" y="168" text-anchor="middle" fill="#04342C">Optimal</text>
  <text font-family="sans-serif" font-size="15" font-weight="600" x="480" y="188" text-anchor="middle" fill="#04342C">Transport</text>
  <text font-family="sans-serif" font-size="11" x="480" y="208" text-anchor="middle" fill="#085041" opacity="0.8">(COT)</text>
  <text font-family="sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" x="340" y="161" text-anchor="middle" fill="#ffffff" opacity="0.95">PEAK</text>
  <text font-family="sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" x="340" y="175" text-anchor="middle" fill="#ffffff" opacity="0.95">FOCUS</text>
  <circle cx="340" cy="165" r="38" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
</svg>
